<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SMC App Refactor</title>
<style>
body {background:#0b0f14;color:#fff;font-family:Arial;padding:20px;}
.card {border:1px solid #333;border-radius:12px;padding:20px;background:#111;}
.title {font-weight:bold;font-size:18px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="card">
  <div class="title">KỊCH BẢN TIẾP THEO</div>
  <div id="scenario"></div>
</div>

<script>
function buildScenario(high, low){
  return `
  • Nếu phá xuống ${low} → giảm về ${low - 25}<br>
  • Nếu phá lên ${high} → tăng lên ${high + 20}<br><br>
  → Hiện tại: KHÔNG GIAO DỊCH
  `;
}

// MOCK DATA (bạn sẽ nối engine thật vào đây)
const rangeHigh = 4720;
const rangeLow = 4675;

document.getElementById("scenario").innerHTML = buildScenario(rangeHigh, rangeLow);
</script>

</body>
</html>
