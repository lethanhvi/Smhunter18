<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Hunter Gold Alert</title>
<style>
body {
    background: #0b0f1a;
    color: #eaeaea;
    font-family: Arial;
    padding: 20px;
}
.box {
    border: 1px solid #2c3e50;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}
.live {
    display: flex;
    align-items: center;
    gap: 10px;
}
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: red;
}
input, select, button {
    padding: 10px;
    margin-top: 10px;
}
.alert-item {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>📡 XAUUSD LIVE</h2>
    <div class="live">
        <div id="live-price">---.--</div>
        <div class="dot" id="live-dot"></div>
    </div>
</div>

<div class="box">
    <h3>🔔 Thêm Alert</h3>
    <input id="price-input" placeholder="Nhập giá (VD: 2350)" />
    <select id="type">
        <option value="above">Giá lên</option>
        <option value="below">Giá xuống</option>
    </select>
    <button onclick="addAlert()">Thêm</button>

    <div id="alert-list"></div>
</div>

<script>
const priceEl = document.getElementById("live-price");
const dot = document.getElementById("live-dot");

let alerts = [];

async function fetchPrice() {
    try {
        const res = await fetch("https://api.gold-api.com/price/XAUUSD");
        const data = await res.json();

        const price = data.price;

        priceEl.textContent = price.toFixed(2);
        dot.style.background = "lime";

        checkAlerts(price);

    } catch (e) {
        dot.style.background = "red";
        console.log("Error:", e);
    }
}

setInterval(fetchPrice, 3000);
fetchPrice();

function addAlert() {
    const price = parseFloat(document.getElementById("price-input").value);
    const type = document.getElementById("type").value;

    if (!price) return;

    alerts.push({ price, type, triggered: false });
    renderAlerts();
}

function renderAlerts() {
    const list = document.getElementById("alert-list");
    list.innerHTML = "";

    alerts.forEach(a => {
        const div = document.createElement("div");
        div.className = "alert-item";
        div.textContent = `${a.type === "above" ? "↑" : "↓"} ${a.price}`;
        list.appendChild(div);
    });
}

function checkAlerts(current) {
    alerts.forEach(a => {
        if (a.triggered) return;

        if (a.type === "above" && current >= a.price) trigger(a);
        if (a.type === "below" && current <= a.price) trigger(a);
    });
}

function trigger(a) {
    a.triggered = true;
    alert("🚨 Giá chạm mức!");
}
</script>

</body>
</html>
