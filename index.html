<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hắc Thủy Ngũ Trận - Gia Cố Tối Thượng</title>
    <style>
        :root { --bg: #080a0c; --gold: #c5a059; --red: #ff4d4d; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 1px solid var(--gold); padding: 20px; border-radius: 8px; background: #121518; margin-bottom: 20px; }
        .error-msg { color: var(--red); font-weight: bold; border: 1px solid var(--red); padding: 10px; margin: 10px 0; display: none; }
        .btn { background: var(--gold); color: black; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h2>⚔️ HẮC THỦY NGŨ TRẬN (V2.1)</h2>
    <div class="box">
        <input type="file" id="d1" accept="image/*">
        <input type="file" id="h4" accept="image/*">
        <div id="error-box" class="error-msg">⚠️ LỖI: QUÁ TẢI - HÃY THỬ LẠI SAU 30 GIÂY</div>
        <button class="btn" onclick="deploy()">XUẤT KÍCH BỘ 1</button>
    </div>

    <script>
        // Bí thuật nén ảnh cực hạn của Quân sư
        async function superCompress(file) {
            return new Promise((res) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_W = 800; // Hạ xuống 800px để thoát lỗi Overload
                        let w = img.width, h = img.height;
                        if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        res(canvas.toDataURL('image/jpeg', 0.5)); // Nén 50% chất lượng
                    };
                };
            });
        }

        async function deploy() {
            const err = document.getElementById('error-box');
            err.style.display = 'none';
            const f1 = document.getElementById('d1').files[0];
            const f2 = document.getElementById('h4').files[0];
            if(!f1 || !f2) return alert("Thiếu sa bàn!");

            try {
                console.log("Đang nén đạn dược cực hạn...");
                const img1 = await superCompress(f1);
                const img2 = await superCompress(f2);
                
                // LƯU Ý: Nếu vẫn lỗi, hãy thử gửi TỪNG ẢNH MỘT. 
                // Quân sư đề xuất Ngài kiểm tra lại đường truyền API của Vercel.
                console.log("Sẵn sàng truyền tin...");
                alert("✅ Ảnh đã được nén cực nhẹ. Đang truyền tin...");
            } catch (e) {
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
