<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smart Hunter - Hắc Thủy Ngũ Trận</title>
    <style>
        :root { --bg: #080a0c; --gold: #c5a059; --red: #ff4d4d; --green: #00ff88; --text: #e0e0e0; --card: #121518; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .phase-card { background: var(--card); border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; transition: 0.3s; }
        h2 { color: var(--gold); text-transform: uppercase; margin-top: 0; border-left: 4px solid var(--gold); padding-left: 15px; }
        .check-item { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .check-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: var(--gold); }
        .btn-action { background: var(--gold); color: #000; border: none; padding: 15px 25px; font-weight: bold; width: 100%; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-action:disabled { background: #444; color: #888; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 14px; }
        .error { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); display: block; }
        .success { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--green); color: var(--green); display: block; }
        input[type="file"] { background: #1a1e22; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; border: 1px dashed #555; margin-top: 10px; }
        .note { font-size: 12px; color: #888; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐺 HẮC THỦY NGŨ TRẬN</h1>
            <p><i>Tĩnh lặng như mặt hồ - Sắc bén như Sniper</i></p>
        </div>

        <div class="phase-card" id="phase-0">
            <h2>🛡️ GIAI ĐOẠN 0 — MENTAL & PHYSICAL</h2>
            <div id="checkgate-list">
                </div>
            <p class="note">⚠️ Nếu trả lời "YES" bất kỳ câu nào: ĐÓNG MÁY NGAY.</p>
            <button id="btn-p0" class="btn-action">XÁC NHẬN ĐỦ ĐIỀU KIỆN</button>
        </div>

        <div class="phase-card" id="phase-1" style="opacity: 0.5; pointer-events: none;">
            <h2>⚔️ BỘ 1 — MARKET STRUCTURE SCANNER</h2>
            <p>Tải lên sa bàn D1 & H4:</p>
            <input type="file" id="img-d1" accept="image/*">
            <input type="file" id="img-h4" accept="image/*">
            <div id="status-b1" class="status"></div>
            <button id="btn-b1" class="btn-action">KHỞI CHẠY PHÂN TÍCH BỘ 1</button>
        </div>

        <p style="text-align:center; color: #555;">Dòng nước đang luân chuyển...</p>
    </div>

    <script>
        // Bí thuật Nén Ảnh của Quân sư
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // Nén 70% chất lượng
                    };
                };
            });
        }

        // Render Checkgate
        const questions = [
            "Mệt mỏi thể chất?", "Thiếu ngủ?", "Đang đói/khát?", "Bực bội lệnh trước?",
            "Muốn gỡ lệnh?", "Đang FOMO?", "Tự tin thái quá?", "Lo lắng Drawdown?",
            "Bị phân tâm?", "Thiếu thời gian theo dõi?"
        ];
        const list = document.getElementById('checkgate-list');
        questions.forEach((q, i) => {
            list.innerHTML += `<label class="check-item"><input type="checkbox" class="p0-check"> ${i+1}. ${q}</label>`;
        });

        // Xử lý Giai đoạn 0
        document.getElementById('btn-p0').onclick = () => {
            const checks = document.querySelectorAll('.p0-check');
            let hasIssue = false;
            checks.forEach(c => { if(c.checked) hasIssue = true; });

            if (hasIssue) {
                alert("⚠️ CẢNH BÁO: Cỗ máy sinh học không ổn định. ĐÓNG MÁY NGAY!");
            } else {
                document.getElementById('phase-1').style.opacity = "1";
                document.getElementById('phase-1').style.pointer-events = "all";
                document.getElementById('phase-0').style.display = "none";
                alert("✅ Đủ điều kiện. Mời Tướng quân quan sát sa bàn.");
            }
        };

        // Xử lý Bộ 1
        document.getElementById('btn-b1').onclick = async () => {
            const d1 = document.getElementById('img-d1').files[0];
            const h4 = document.getElementById('img-h4').files[0];
            const status = document.getElementById('status-b1');

            if(!d1 || !h4) return alert("Bẩm Tướng quân, thiếu sa bàn!");

            status.className = "status success";
            status.innerHTML = "🌀 Đang nén ảnh và truyền tin...";
            status.style.display = "block";

            try {
                const d1Nen = await compressImage(d1);
                const h4Nen = await compressImage(h4);
                
                // Gửi dữ liệu đi (Ngài dán API logic của Ngài vào đây)
                console.log("Dữ liệu đã sẵn sàng:", d1Nen.length, h4Nen.length);
                status.innerHTML = "✅ Truyền tin thành công. Đang chờ Quân sư phản hồi...";
            } catch (err) {
                status.className = "status error";
                status.innerHTML = "❌ Lỗi: Hệ thống quá tải. Hãy kiểm tra lại API.";
            }
        };
    </script>
</body>
</html>
