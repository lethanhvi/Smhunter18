<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Hunter Gold Alert PRO</title>
<style>
body { background:#0b0f1a; color:#fff; font-family:Arial; padding:20px;}
.box { border:1px solid #2c3e50; border-radius:12px; padding:20px; margin-bottom:20px;}
.live { display:flex; align-items:center; gap:10px; font-size:24px;}
.dot { width:10px; height:10px; border-radius:50%; background:red;}
input, select, button { padding:10px; margin-top:10px; width:100%; }
button { background:#f1c40f; border:none; cursor:pointer;}
.alert-item { margin-top:10px; }
</style>
</head>

<body>

<div class="box">
<h2>📡 XAUUSD LIVE</h2>
<div class="live">
<span id="live-price">---.--</span>
<div id="live-dot" class="dot"></div>
</div>
</div>

<div class="box">
<h3>🔔 Thêm Alert</h3>
<input id="price-input" placeholder="Nhập giá (VD: 2350)">
<select id="type">
<option value="above">Giá lên</option>
<option value="below">Giá xuống</option>
</select>
<button onclick="addAlert()">Thêm Alert</button>
<div id="alert-list"></div>
</div>

<script>
const priceEl = document.getElementById("live-price");
const dot = document.getElementById("live-dot");

let alerts = [];

async function fetchGoldPrice() {
  try {
    let res = await fetch("https://api.metals.live/v1/spot/gold");
    let data = await res.json();
    let price = data[0].gold;

    if (!price) throw "Primary API fail";

    updateUI(price);

  } catch (e) {
    // fallback using CORS proxy
    try {
      let res = await fetch("https://api.allorigins.win/raw?url=https://api.metals.live/v1/spot/gold");
      let data = await res.json();
      let price = data[0].gold;

      updateUI(price);

    } catch (err) {
      dot.style.background = "red";
      console.log("All API failed");
    }
  }
}

function updateUI(price){
  priceEl.textContent = price.toFixed(2);
  dot.style.background = "#00ff9d";
  checkAlerts(price);
}

setInterval(fetchGoldPrice, 3000);
fetchGoldPrice();

function addAlert(){
  const price = parseFloat(document.getElementById("price-input").value);
  const type = document.getElementById("type").value;

  if (!price) return;

  alerts.push({price, type, triggered:false});
  renderAlerts();
}

function renderAlerts(){
  const list = document.getElementById("alert-list");
  list.innerHTML = "";

  alerts.forEach(a=>{
    const div = document.createElement("div");
    div.className="alert-item";
    div.textContent = (a.type==="above"?"↑":"↓") + " " + a.price;
    list.appendChild(div);
  });
}

function checkAlerts(current){
  alerts.forEach(a=>{
    if(a.triggered) return;

    if(a.type==="above" && current>=a.price) trigger(a);
    if(a.type==="below" && current<=a.price) trigger(a);
  });
}

function trigger(a){
  a.triggered = true;
  alert("🚨 Giá chạm mức!");
}
</script>

</body>
</html>
